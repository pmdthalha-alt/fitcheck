<!DOCTYPE html>
<html lang="en">
<head>
  <title>FitCheck AI - Smart Scan</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
    }
    
    /* Main Container */
    #app { position: relative; width: 100vw; height: 100vh; display: flex; }
    
    /* Camera Layer */
    .camera-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    
    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror effect */
    }

    #output {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Chat Interface (Right Panel) */
    .chat-panel {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 350px;
      height: 500px;
      background: rgba(10, 20, 30, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      z-index: 10;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .chat-header {
      padding: 20px;
      background: linear-gradient(90deg, rgba(0,255,204,0.1), transparent);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bot-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #00ffcc, #0099ff);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(0,255,204,0.4);
    }

    .bot-info h3 { font-size: 16px; color: white; }
    .bot-info p { font-size: 12px; color: #00ffcc; }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      animation: slideIn 0.3s ease-out;
    }

    .message.bot {
      background: rgba(255,255,255,0.1);
      border-top-left-radius: 2px;
      align-self: flex-start;
      border-left: 3px solid #00ffcc;
    }

    .message.user {
      background: rgba(0, 102, 255, 0.3);
      border-top-right-radius: 2px;
      align-self: flex-end;
      color: white;
    }
    
    .chat-actions {
      padding: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(0,255,204,0.4);
      color: #00ffcc;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: 0.3s;
    }

    .action-btn:hover {
      background: rgba(0,255,204,0.1);
      border-color: #00ffcc;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Layer 1: Camera & Visualization -->
    <div class="camera-layer">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="output"></canvas>
    </div>
    
    <!-- Layer 2: Chat Interface -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <div class="bot-avatar">🤖</div>
        <div class="bot-info">
          <h3>FitBot AI</h3>
          <p>Scanning Assistant</p>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <!-- Messages will appear here -->
      </div>

      <div class="chat-actions" id="chatActions">
        <button class="action-btn" onclick="startScan()">Start Scanning</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1635987980/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.5.1635987980/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.5.1635987980/drawing_utils.js"></script>
  <script type="module" src="scanner.js"></script>
</body>
</html>
